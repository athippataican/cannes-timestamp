function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkGPS() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve({ ok: false, reason: "GPS ไม่รองรับบนอุปกรณ์นี้" }); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const dist = haversineDistance(pos.coords.latitude, pos.coords.longitude, SHOP_LOCATION.lat, SHOP_LOCATION.lng);
        if (dist <= ALLOWED_RADIUS_M) {
          resolve({ ok: true, distance: Math.round(dist) });
        } else {
          resolve({ ok: false, reason: `คุณอยู่ห่างจากร้าน ${Math.round(dist)} เมตร (อนุญาต ${ALLOWED_RADIUS_M}m)`, distance: Math.round(dist) });
        }
      },
      (err) => {
        const msgs = { 1: "ไม่อนุญาตเข้าถึงตำแหน่ง — กรุณาเปิด GPS", 2: "ไม่สามารถหาตำแหน่งได้", 3: "หมดเวลาค้นหาตำแหน่ง" };
        resolve({ ok: false, reason: msgs[err.code] || "GPS error" });
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
  });
}

// ══════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════
const fmt = (d) => d.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
const fmtShort = (d) => d.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
const fmtDate = (d) => d.toLocaleDateString("th-TH", { weekday: "short", year: "numeric", month: "short", day: "numeric" });
const fmtDateFull = (d) => d.toLocaleDateString("th-TH", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
const getTodayKey = () => new Date().toISOString().slice(0, 10);

function calcDiff(a, b) {
  if (!a || !b) return null;
  const ms = new Date(b) - new Date(a);
  return { hrs: Math.floor(ms / 3600000), mins: Math.floor((ms % 3600000) / 60000), totalMins: Math.floor(ms / 60000) };
}
function diffLabel(a, b) { const d = calcDiff(a, b); return d ? `${d.hrs}ชม. ${d.mins}น.` : "—"; }

function isLate(isoStr, scheduleIn) {
  if (!isoStr || !scheduleIn) return false;
  const d = new Date(isoStr);
  const [h, m] = scheduleIn.split(":").map(Number);
  const sched = new Date(d); sched.setHours(h, m, 0, 0);
  return d > sched;
}
function lateMinutes(isoStr, scheduleIn) {
  if (!isoStr || !scheduleIn) return 0;
  const d = new Date(isoStr);
  const [h, m] = scheduleIn.split(":").map(Number);
  const sched = new Date(d); sched.setHours(h, m, 0, 0);
  const diff = Math.floor((d - sched) / 60000);
  return diff > 0 ? diff : 0;
}

function getRecordStatus(rec, emp) {
  if (!rec || !rec.checkIn) return "idle";
  const isSplit = rec.shift === 1 && emp.shifts;
  if (isSplit) {
    if (rec.checkIn2 && rec.checkOut2) return "done";
    if (rec.checkIn2 && !rec.checkOut2) return "working_r2";
    if (rec.checkIn && rec.checkOut && !rec.checkIn2) return "on_break";
    if (rec.checkIn && !rec.checkOut) return "working_r1";
  } else {
    if (rec.checkOut) return "done";
    if (rec.checkIn) return "working";
  }
  return "idle";
}

function totalWorkedMins(rec) {
  if (!rec) return 0;
  let total = 0;
  if (rec.checkIn && rec.checkOut) { const d = calcDiff(rec.checkIn, rec.checkOut); if (d) total += d.totalMins; }
  if (rec.checkIn2 && rec.checkOut2) { const d = calcDiff(rec.checkIn2, rec.checkOut2); if (d) total += d.totalMins; }
  return total;
}

function calcOT(rec, scheduledHours) {
  if (!rec || scheduledHours == null) return null;
  const isSplit = rec.shift === 1 && SHIFT_INFO[1].split;
  if (isSplit) { if (!rec.checkIn || !rec.checkOut || !rec.checkIn2 || !rec.checkOut2) return null; }
  else { if (!rec.checkIn || !rec.checkOut) return null; }
  const actualHrs = rec.shift ? (SHIFT_INFO[rec.shift]?.hours || scheduledHours) : scheduledHours;
  const workedMins = totalWorkedMins(rec);
  const otMins = workedMins - (actualHrs * 60);
  return otMins > 0 ? { hrs: Math.floor(otMins / 60), mins: otMins % 60, totalMins: otMins } : null;
}

function writeRecord(dateKey, empId, data) {
  if (firebaseReady && db) {
    db.ref(`records/${dateKey}/${empId}`).update(data);
  }
}

function readPin(empId) {
  return new Promise((resolve) => {
    if (!firebaseReady || !db) { resolve(DEFAULT_PINS[empId] || "0000"); return; }
    db.ref(`pins/${empId}`).once("value", (snap) => {
      resolve(snap.val() || DEFAULT_PINS[empId] || "0000");
    });
  });
}

function writePin(empId, pin) {
  if (firebaseReady && db) {
    db.ref(`pins/${empId}`).set(pin);
  }
}

function writeEditLog(dateKey, empId, logEntry) {
  if (firebaseReady && db) {
    db.ref(`edit_logs/${dateKey}/${empId}`).push(logEntry);
  }
}

function writeEditRequest(dateKey, empId, request) {
  if (firebaseReady && db) {
    db.ref(`edit_requests/${dateKey}/${empId}`).push(request);
  }
}

function approveEditRequest(dateKey, empId, requestKey, approverEmpId, changes) {
  if (!firebaseReady || !db) return;
  // Apply changes to actual record
  const newData = {};
  changes.forEach(c => {
    newData[c.field] = c.newISO;
  });
  writeRecord(dateKey, empId, newData);
  // Update request status
  db.ref(`edit_requests/${dateKey}/${empId}/${requestKey}`).update({
    status: "approved",
    approvedBy: approverEmpId,
    approvedAt: new Date().toISOString(),
  });
  // Also write to edit_logs for history
  const logEntry = {
    editedBy: approverEmpId,
    editedAt: new Date().toISOString(),
    reason: "อนุมัติแก้ไข",
    changes: changes.map(c => ({ field: c.field, fieldLabel: c.fieldLabel, oldValue: c.oldValue, newValue: c.newValue })),
  };
  writeEditLog(dateKey, empId, logEntry);
}

function rejectEditRequest(dateKey, empId, requestKey, rejecterEmpId, rejectReason) {
  if (!firebaseReady || !db) return;
  db.ref(`edit_requests/${dateKey}/${empId}/${requestKey}`).update({
    status: "rejected",
    rejectedBy: rejecterEmpId,
    rejectedAt: new Date().toISOString(),
    rejectReason: rejectReason || "",
  });
}

function parseTimeToISO(dateKey, timeStr) {
  // timeStr = "HH:MM", returns ISO string for that day+time
  if (!timeStr) return null;
  const [h, m] = timeStr.split(":").map(Number);
  const d = new Date(dateKey + "T00:00:00");
  d.setHours(h, m, 0, 0);
  // Handle midnight+ (next day)
  return d.toISOString();
}

function isoToTimeStr(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

// ─── Break Countdown ───
function BreakCountdown({ checkOutR1 }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  const outTime = new Date(checkOutR1);
  const target = new Date(outTime); target.setHours(17, 0, 0, 0);
  const remaining = target - now;
  const elapsed = now - outTime;
  const eMins = Math.max(0, Math.floor(elapsed / 60000));
  const eH = Math.floor(eMins / 60), eM = eMins % 60;
  if (remaining <= 0) {
    return (
      <div style={{ padding: "14px", borderRadius: "12px", background: "linear-gradient(135deg, #5c4a2e, #8b6d3f)", border: `1px solid ${T.warm}50`, animation: "pulse 2s infinite", marginBottom: "12px" }}>
        <div style={{ fontSize: "14px", fontWeight: 800, color: "#fff" }}>⏰ ถึงเวลาเข้างานรอบ 2 แล้ว!</div>
        <div style={{ fontSize: "12px", color: "#d4a574", marginTop: "4px" }}>พักมาแล้ว {eH > 0 ? `${eH}ชม. ` : ""}{eM}น.</div>
      </div>
    );
  }
  const rMins = Math.floor(remaining / 60000); const rH = Math.floor(rMins / 60), rM = rMins % 60;
  return (
    <div style={{ padding: "14px", borderRadius: "12px", background: `${T.warmLight}15`, border: `1px solid ${T.warmLight}30`, marginBottom: "12px" }}>
      <div style={{ fontSize: "14px", fontWeight: 800, color: T.warmLight }}>☕ พักเบรค</div>
      <div style={{ fontSize: "12px", color: T.textMuted, marginTop: "4px" }}>พักมาแล้ว {eH > 0 ? `${eH}ชม. ` : ""}{eM}น. — เข้ารอบ 2 อีก {rH > 0 ? `${rH}ชม. ` : ""}{rM}น.</div>
    </div>
  );
}

// ─── My Check-in Card (main employee view) ───
function MyCheckInCard({ emp, record, onAction, showToast }) {
  const status = getRecordStatus(record, emp);
  const isSplit = emp.shifts;
  const todayKey = getTodayKey();
  const [note, setNote] = useState(record?.note || "");

  const [showPin, setShowPin] = useState(false);

  const requestAction = (action) => {
    setPendingAction(action);
    setShowPin(true);
  };

  const handlePinSuccess = () => {
    setShowPin(false);
    if (!pendingAction) return;
    if (pendingAction.type === "checkIn") doCheckIn(pendingAction.shift);
    else if (pendingAction.type === "checkOut") doCheckOut();
    else if (pendingAction.type === "checkInR2") doCheckInR2();
    setPendingAction(null);
  };

  const handlePinCancel = () => {
    setShowPin(false);
    setPendingAction(null);
  };

  const doCheckIn = (shift) => {
    const now = new Date().toISOString();
    const schedIn = shift === 1 ? SHIFT_INFO[1].r1In : emp.scheduleIn;
    const late = isLate(now, schedIn);
    const data = { checkIn: now, checkOut: null, checkIn2: null, checkOut2: null, shift: shift, note: "" };
    writeRecord(todayKey, emp.id, data);
    onAction({ ...data, empId: emp.id });
    const lateMsg = late ? ` (สาย ${lateMinutes(now, schedIn)} นาที)` : "";
    showToast(`เช็คอินสำเร็จ${shift === 1 ? " — รอบเช้า" : ""}${lateMsg}`, late ? "warning" : "success");
  };

  const doCheckOut = () => {
    const now = new Date().toISOString();
    if (status === "working" || status === "working_r1") {
      writeRecord(todayKey, emp.id, { checkOut: now });
      onAction({ ...record, checkOut: now });
      if (status === "working_r1") showToast("ออกงานรอบเช้า — พักเบรค ☕ กลับ 17:00", "info");

    } else if (status === "working_r2") {
      writeRecord(todayKey, emp.id, { checkOut2: now });
      onAction({ ...record, checkOut2: now });
      showToast("เช็คเอาท์รอบเย็นสำเร็จ!");
    }
  };

  const doCheckInR2 = () => {
    const now = new Date().toISOString();
    const late = isLate(now, SHIFT_INFO[1].r2In);
    writeRecord(todayKey, emp.id, { checkIn2: now });
    onAction({ ...record, checkIn2: now });
    const lateMsg = late ? ` (สาย ${lateMinutes(now, SHIFT_INFO[1].r2In)} นาที)` : "";
    showToast(`เข้างานรอบเย็น${lateMsg}`, late ? "warning" : "info");
  };

  const handleNote = (val) => {
    setNote(val);
    writeRecord(todayKey, emp.id, { note: val });
  };

  const worked = totalWorkedMins(record);
  const ot = status === "done" ? calcOT(record, emp.hours) : null;

  const statusLabels = {
    idle: { text: "ยังไม่เข้างาน", color: T.textDim, icon: "⏳" },
    working: { text: "กำลังทำงาน", color: T.green, icon: "🔥" },
    working_r1: { text: "กำลังทำงาน (R1)", color: T.green, icon: "🔥" },
    on_break: { text: "พักเบรค", color: T.warmLight, icon: "☕" },
    working_r2: { text: "กำลังทำงาน (R2)", color: T.green, icon: "🔥" },
    done: { text: "เสร็จแล้ววันนี้", color: T.purple, icon: "🏠" },
  };
  const st = statusLabels[status] || statusLabels.idle;

  return (

// ─── PIN Dialog ───
function PinDialog({ emp, onSuccess, onCancel, showToast }) {
  const [pin, setPin] = useState("");
  const [checking, setChecking] = useState(false);
  const [gpsStatus, setGpsStatus] = useState(null); // null=not checked, "checking", {ok, reason, distance}
  const inputRef = useRef(null);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  // Auto-check GPS on mount
  useEffect(() => {
    setGpsStatus("checking");
    checkGPS().then(result => setGpsStatus(result));
  }, []);

  const handleSubmit = async () => {
    if (pin.length !== 4) { showToast("กรุณาใส่ PIN 4 หลัก", "error"); return; }
    setChecking(true);

    // Verify PIN
    const correctPin = await readPin(emp.id);
    if (pin !== correctPin) {
      showToast("PIN ไม่ถูกต้อง", "error");
      setPin("");
      setChecking(false);
      if (inputRef.current) inputRef.current.focus();
      return;
    }

    // Check GPS
    if (!gpsStatus || gpsStatus === "checking") {
      const result = await checkGPS();
      setGpsStatus(result);
      if (!result.ok) {
        showToast(result.reason, "error");
        setChecking(false);
        return;
      }
    } else if (!gpsStatus.ok) {
      showToast(gpsStatus.reason, "error");
      setChecking(false);
      return;
    }

    setChecking(false);
    onSuccess();
  };

  const handleKeyDown = (e) => { if (e.key === "Enter") handleSubmit(); };

  const pinDots = [0,1,2,3].map(i => (
    <div key={i} style={{
      width: 20, height: 20, borderRadius: "50%",
      background: pin.length > i ? T.accent : T.border,
      transition: "all 0.15s",
    }} />
  ));

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 10000, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" }}>
      <div style={{ background: T.card, borderRadius: "20px", width: "100%", maxWidth: 340, border: `1px solid ${T.border}`, animation: "fadeIn 0.2s ease", padding: "28px 24px" }}>
        <div style={{ textAlign: "center", marginBottom: "20px" }}>
          <div style={{ fontSize: "36px", marginBottom: "8px" }}>🔐</div>
          <div style={{ fontSize: "18px", fontWeight: 800, color: T.text }}>ยืนยันตัวตน</div>
          <div style={{ fontSize: "13px", color: T.accent, fontWeight: 700, marginTop: "4px" }}>{emp.name}</div>
        </div>

        {/* GPS Status */}
        <div style={{
          padding: "10px 14px", borderRadius: "10px", marginBottom: "16px",
          background: gpsStatus === "checking" ? `${T.accent}15` : gpsStatus?.ok ? `${T.green}15` : `${T.red}15`,
          border: `1px solid ${gpsStatus === "checking" ? `${T.accent}30` : gpsStatus?.ok ? `${T.green}30` : `${T.red}30`}`,
        }}>
          <div style={{ fontSize: "12px", fontWeight: 700, color: gpsStatus === "checking" ? T.accent : gpsStatus?.ok ? T.green : T.red }}>
            {gpsStatus === "checking" ? "📍 กำลังตรวจ GPS..." : gpsStatus?.ok ? `📍 อยู่ในรัศมีร้าน (${gpsStatus.distance}m)` : `📍 ${gpsStatus?.reason || "ไม่ทราบ"}`}
          </div>
        </div>

        {/* PIN Input */}
        <div style={{ fontSize: "13px", color: T.textDim, textAlign: "center", marginBottom: "8px", fontWeight: 600 }}>ใส่ PIN 4 หลัก</div>
        <div style={{ display: "flex", justifyContent: "center", gap: "12px", marginBottom: "12px" }}>{pinDots}</div>
        <input ref={inputRef} type="tel" inputMode="numeric" pattern="[0-9]*" maxLength={4}
          value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
          onKeyDown={handleKeyDown}
          style={{
            width: "100%", padding: "14px", borderRadius: "12px", border: `1px solid ${T.border}`,
            background: T.bg, color: T.text, fontSize: "24px", fontWeight: 800, fontFamily: "monospace",
            textAlign: "center", letterSpacing: "12px", outline: "none",
            caretColor: "transparent",
          }}
        />

        {/* Buttons */}
        <div style={{ display: "flex", gap: "8px", marginTop: "16px" }}>
          <button onClick={onCancel} style={{
            flex: 1, padding: "14px", borderRadius: "12px", border: `1px solid ${T.border}`,
            background: "transparent", color: T.textMuted, fontSize: "15px", fontWeight: 700, cursor: "pointer",
          }}>ยกเลิก</button>
          <button onClick={handleSubmit} disabled={checking || pin.length < 4} style={{
            flex: 1, padding: "14px", borderRadius: "12px", border: "none",
            background: pin.length === 4 ? `linear-gradient(135deg, ${T.green}, #166534)` : T.border,
            color: pin.length === 4 ? "#fff" : T.textDim,
            fontSize: "15px", fontWeight: 800, cursor: "pointer", opacity: checking ? 0.6 : 1,
          }}>{checking ? "กำลังตรวจ..." : "ยืนยัน"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Edit Modal ───
function EditModal({ emp, record, dateKey, onClose, showToast, editedBy }) {
  const isSplit = record?.shift === 1 && emp.shifts;
  const [checkIn, setCheckIn] = useState(isoToTimeStr(record?.checkIn));
  const [checkOut, setCheckOut] = useState(isoToTimeStr(record?.checkOut));
  const [checkIn2, setCheckIn2] = useState(isoToTimeStr(record?.checkIn2));
  const [checkOut2, setCheckOut2] = useState(isoToTimeStr(record?.checkOut2));
  const [reason, setReason] = useState("");
  const [saving, setSaving] = useState(false);

  const handleSave = () => {
    if (!reason.trim()) { showToast("กรุณาใส่เหตุผลในการแก้ไข", "error"); return; }
    setSaving(true);

    const changes = [];

    // Compare and build change log
    const fields = [
      { key: "checkIn", label: "เข้างาน", oldISO: record?.checkIn, newTime: checkIn },
      { key: "checkOut", label: "ออกงาน", oldISO: record?.checkOut, newTime: checkOut },
    ];
    if (isSplit) {
      fields.push({ key: "checkIn2", label: "เข้างาน R2", oldISO: record?.checkIn2, newTime: checkIn2 });
      fields.push({ key: "checkOut2", label: "ออกงาน R2", oldISO: record?.checkOut2, newTime: checkOut2 });
    }

    fields.forEach(f => {
      const oldTime = isoToTimeStr(f.oldISO);
      if (f.newTime !== oldTime) {
        changes.push({
          field: f.key,
          fieldLabel: f.label,
          oldValue: oldTime || "—",
          newValue: f.newTime || "—",
          newISO: f.newTime ? parseTimeToISO(dateKey, f.newTime) : null,
        });
      }
    });

    if (changes.length === 0) { showToast("ไม่มีการเปลี่ยนแปลง", "info"); setSaving(false); return; }

    // Create pending edit request (NOT direct edit)
    const request = {
      requestedBy: editedBy,
      requestedAt: new Date().toISOString(),
      reason: reason.trim(),
      changes: changes,
      status: "pending",
      empName: emp.name,
    };
    writeEditRequest(dateKey, emp.id, request);
    showToast(`ส่งคำขอแก้ไข ${emp.name} แล้ว — รออนุมัติ`, "success");
    setSaving(false);
    onClose();
  };

  const inputStyle = {
    width: "100%", padding: "10px 12px", borderRadius: "10px",
    border: `1px solid ${T.border}`, background: T.bg, color: T.text,
    fontSize: "16px", fontFamily: "monospace", outline: "none",
  };
  const labelStyle = { fontSize: "12px", color: T.textDim, marginBottom: "4px", fontWeight: 600 };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 10000, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: T.card, borderRadius: "20px", width: "100%", maxWidth: 400, maxHeight: "90vh", overflow: "auto", border: `1px solid ${T.border}`, animation: "fadeIn 0.2s ease" }}>
        {/* Header */}
        <div style={{ padding: "20px 20px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: "18px", fontWeight: 800, color: T.text }}>ขอแก้ไขเวลา</div>
            <div style={{ fontSize: "13px", color: T.accent, fontWeight: 700 }}>{emp.name} — {dateKey}</div>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: "8px", border: `1px solid ${T.border}`, background: "transparent", color: T.textMuted, fontSize: "18px", cursor: "pointer" }}>✕</button>

                <div>
                  <div style={labelStyle}>ออกงาน R2</div>
                  <input type="time" value={checkOut2} onChange={e => setCheckOut2(e.target.value)} style={inputStyle} />
                </div>
              </>
            )}

          {/* Reason (required) */}
          <div>
            <div style={labelStyle}>เหตุผลในการแก้ไข *</div>
            <textarea value={reason} onChange={e => setReason(e.target.value)}
              placeholder="เช่น ลืมเช็คอิน, เวลาผิดพลาด..."
              rows={2}
              style={{ ...inputStyle, fontFamily: "inherit", resize: "none" }} />
          </div>

          {/* Buttons */}
          <div style={{ display: "flex", gap: "8px", marginTop: "4px" }}>
            <button onClick={onClose} style={{
              flex: 1, padding: "14px", borderRadius: "12px", border: `1px solid ${T.border}`,
              background: "transparent", color: T.textMuted, fontSize: "15px", fontWeight: 700, cursor: "pointer",
            }}>ยกเลิก</button>
            <button onClick={handleSave} disabled={saving} style={{
              flex: 1, padding: "14px", borderRadius: "12px", border: "none",
              background: `linear-gradient(135deg, ${T.accent}, #d97706)`, color: "#000",
              fontSize: "15px", fontWeight: 800, cursor: "pointer", opacity: saving ? 0.6 : 1,
            }}>{saving ? "กำลังส่ง..." : "ส่งคำขอ"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Edit Log Viewer ───
function EditLogViewer({ emp, dateKey, onClose }) {

  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!firebaseReady || !db) { setLoading(false); return; }
    const ref = db.ref(`edit_logs/${dateKey}/${emp.id}`);
    ref.once("value", (snap) => {
      const data = snap.val();
      if (data) {
        const arr = Object.values(data).sort((a, b) => new Date(b.editedAt) - new Date(a.editedAt));
        setLogs(arr);
      }
      setLoading(false);
    });

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 10000, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: T.card, borderRadius: "20px", width: "100%", maxWidth: 400, maxHeight: "90vh", overflow: "auto", border: `1px solid ${T.border}`, animation: "fadeIn 0.2s ease" }}>
        <div style={{ padding: "20px 20px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: "18px", fontWeight: 800, color: T.text }}>ประวัติแก้ไข</div>
            <div style={{ fontSize: "13px", color: T.accent, fontWeight: 700 }}>{emp.name} — {dateKey}</div>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: "8px", border: `1px solid ${T.border}`, background: "transparent", color: T.textMuted, fontSize: "18px", cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ padding: "16px 20px 20px" }}>
          {loading && <div style={{ textAlign: "center", color: T.textDim, padding: "20px" }}>กำลังโหลด...</div>}

              <div key={i} style={{ background: T.bg, borderRadius: "12px", padding: "14px", marginBottom: i < logs.length - 1 ? "10px" : 0, border: `1px solid ${T.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                  <span style={{ fontSize: "13px", fontWeight: 700, color: T.warm }}>แก้ไขโดย {editedByEmp?.name || "ไม่ทราบ"}</span>
                  <span style={{ fontSize: "11px", color: T.textDim }}>{new Date(log.editedAt).toLocaleString("th-TH")}</span>
                </div>
                <div style={{ fontSize: "13px", color: T.text, marginBottom: "8px", padding: "8px", background: `${T.warm}10`, borderRadius: "8px", border: `1px solid ${T.warm}20` }}>
                  "{log.reason}"
                </div>
                {log.changes && log.changes.map((c, j) => (
                  <div key={j} style={{ fontSize: "12px", color: T.textMuted, display: "flex", gap: "6px", alignItems: "center", marginTop: "4px" }}>

// ─── Pending Edits Panel ───
function PendingEditsPanel({ dateKey, approverEmpId, showToast, onClose }) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [rejectingKey, setRejectingKey] = useState(null);
  const [rejectReason, setRejectReason] = useState("");

  useEffect(() => {
    if (!firebaseReady || !db) { setLoading(false); return; }
    const ref = db.ref(`edit_requests/${dateKey}`);
    const handler = ref.on("value", (snap) => {
      const data = snap.val() || {};
      const arr = [];
      Object.entries(data).forEach(([empId, reqs]) => {
        Object.entries(reqs).forEach(([key, req]) => {
          arr.push({ ...req, empId: parseInt(empId), key, parentEmpId: empId });
        });
      });
      arr.sort((a, b) => new Date(b.requestedAt) - new Date(a.requestedAt));
      setRequests(arr);
      setLoading(false);
    });
    return () => ref.off("value", handler);
  }, [dateKey]);

  const handleApprove = (req) => {
    approveEditRequest(dateKey, req.parentEmpId, req.key, approverEmpId, req.changes);
    showToast(`อนุมัติแก้ไขเวลา ${req.empName} แล้ว`, "success");
  };

  const handleReject = (req) => {
    if (!rejectReason.trim()) { showToast("กรุณาใส่เหตุผลที่ปฏิเสธ", "error"); return; }
    rejectEditRequest(dateKey, req.parentEmpId, req.key, approverEmpId, rejectReason.trim());
    showToast(`ปฏิเสธคำขอแก้ไข ${req.empName}`, "warning");
    setRejectingKey(null);
    setRejectReason("");
  };

  const pending = requests.filter(r => r.status === "pending");
  const handled = requests.filter(r => r.status !== "pending");

  const statusBadge = (status) => {
    if (status === "approved") return { text: "อนุมัติ", bg: `${T.green}20`, color: T.green, icon: "✓" };
    if (status === "rejected") return { text: "ปฏิเสธ", bg: `${T.red}20`, color: T.red, icon: "✕" };
    return { text: "รออนุมัติ", bg: `${T.accent}20`, color: T.accent, icon: "⏳" };
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 10000, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: T.card, borderRadius: "20px", width: "100%", maxWidth: 440, maxHeight: "90vh", overflow: "auto", border: `1px solid ${T.border}`, animation: "fadeIn 0.2s ease" }}>
        <div style={{ padding: "20px 20px 0", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: T.card, zIndex: 1, borderRadius: "20px 20px 0 0" }}>
          <div>
            <div style={{ fontSize: "18px", fontWeight: 800, color: T.text }}>คำขอแก้ไขเวลา</div>
            <div style={{ fontSize: "13px", color: T.textDim }}>{dateKey} {pending.length > 0 ? `— ${pending.length} รออนุมัติ` : ""}</div>
          </div>
          <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: "8px", border: `1px solid ${T.border}`, background: "transparent", color: T.textMuted, fontSize: "18px", cursor: "pointer" }}>✕</button>
        </div>

        <div style={{ padding: "16px 20px 20px" }}>
          {loading && <div style={{ textAlign: "center", color: T.textDim, padding: "20px" }}>กำลังโหลด...</div>}
          {!loading && requests.length === 0 && <div style={{ textAlign: "center", color: T.textDim, padding: "20px" }}>ยังไม่มีคำขอแก้ไข</div>}

          {/* Pending requests first */}
          {pending.map((req) => {
            const requestedByEmp = EMPLOYEES.find(e => e.id === req.requestedBy);
            const badge = statusBadge(req.status);
            const isRejecting = rejectingKey === req.key;
            return (
              <div key={req.key} style={{ background: T.bg, borderRadius: "14px", padding: "16px", marginBottom: "10px", border: `1px solid ${T.accent}40` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
                  <div>
                    <span style={{ fontSize: "15px", fontWeight: 800, color: T.text }}>{req.empName}</span>
                    <span style={{ fontSize: "11px", color: T.textDim, marginLeft: "8px" }}>ขอโดย {requestedByEmp?.name || "ไม่ทราบ"}</span>
                  </div>
                  <span style={{ fontSize: "11px", background: badge.bg, color: badge.color, padding: "3px 8px", borderRadius: "6px", fontWeight: 700 }}>{badge.icon} {badge.text}</span>
                </div>
                {/* Reason */}
                <div style={{ fontSize: "13px", color: T.text, padding: "8px 10px", background: `${T.warm}10`, borderRadius: "8px", border: `1px solid ${T.warm}20`, marginBottom: "10px" }}>
                  "{req.reason}"
                </div>
                {/* Changes */}
                {req.changes && req.changes.map((c, j) => (
                  <div key={j} style={{ fontSize: "12px", color: T.textMuted, display: "flex", gap: "6px", alignItems: "center", marginBottom: "4px" }}>
                    <span style={{ color: T.textDim, fontWeight: 600 }}>{c.fieldLabel}:</span>
                    <span style={{ color: T.red, textDecoration: "line-through", fontFamily: "monospace" }}>{c.oldValue}</span>
                    <span style={{ color: T.textDim }}>→</span>
                    <span style={{ color: T.green, fontWeight: 700, fontFamily: "monospace" }}>{c.newValue}</span>
                  </div>
                ))}
                <div style={{ fontSize: "11px", color: T.textDim, marginTop: "8px" }}>{new Date(req.requestedAt).toLocaleString("th-TH")}</div>

                {/* Reject reason input */}
                {isRejecting && (
                  <div style={{ marginTop: "10px" }}>
                    <input type="text" placeholder="เหตุผลที่ปฏิเสธ..." value={rejectReason} onChange={e => setRejectReason(e.target.value)}
                      style={{ width: "100%", padding: "10px 12px", borderRadius: "8px", border: `1px solid ${T.border}`, background: T.card, color: T.text, fontSize: "13px", outline: "none" }} />
                    <div style={{ display: "flex", gap: "6px", marginTop: "6px" }}>
                      <button onClick={() => { setRejectingKey(null); setRejectReason(""); }} style={{ flex: 1, padding: "8px", borderRadius: "8px", border: `1px solid ${T.border}`, background: "transparent", color: T.textMuted, fontSize: "12px", fontWeight: 700, cursor: "pointer" }}>ยกเลิก</button>
                      <button onClick={() => handleReject(req)} style={{ flex: 1, padding: "8px", borderRadius: "8px", border: "none", background: T.red, color: "#fff", fontSize: "12px", fontWeight: 700, cursor: "pointer" }}>ยืนยันปฏิเสธ</button>
                    </div>
                  </div>
                )}

                {/* Action buttons */}
                {!isRejecting && (
                  <div style={{ display: "flex", gap: "8px", marginTop: "12px" }}>
                    <button onClick={() => { setRejectingKey(req.key); setRejectReason(""); }} style={{
                      flex: 1, padding: "10px", borderRadius: "10px", border: `1px solid ${T.red}40`,
                      background: `${T.red}15`, color: T.red, fontSize: "13px", fontWeight: 700, cursor: "pointer",
                    }}>✕ ปฏิเสธ</button>
                    <button onClick={() => handleApprove(req)} style={{
                      flex: 1, padding: "10px", borderRadius: "10px", border: "none",
                      background: `linear-gradient(135deg, ${T.green}, #166534)`, color: "#fff",
                      fontSize: "13px", fontWeight: 800, cursor: "pointer",
                    }}>✓ อนุมัติ</button>
                  </div>
                )}
              </div>
            );
          })}

          {/* Handled requests */}
          {handled.length > 0 && pending.length > 0 && (
            <div style={{ fontSize: "12px", color: T.textDim, fontWeight: 700, margin: "16px 0 8px", borderTop: `1px solid ${T.border}`, paddingTop: "12px" }}>ดำเนินการแล้ว</div>
          )}
          {handled.map((req) => {
            const requestedByEmp = EMPLOYEES.find(e => e.id === req.requestedBy);
            const badge = statusBadge(req.status);
            const handledByEmp = EMPLOYEES.find(e => e.id === (req.approvedBy || req.rejectedBy));
            return (
              <div key={req.key} style={{ background: T.bg, borderRadius: "12px", padding: "14px", marginBottom: "8px", border: `1px solid ${T.border}`, opacity: 0.7 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "6px" }}>
                  <span style={{ fontSize: "14px", fontWeight: 700, color: T.text }}>{req.empName}</span>
                  <span style={{ fontSize: "11px", background: badge.bg, color: badge.color, padding: "3px 8px", borderRadius: "6px", fontWeight: 700 }}>{badge.icon} {badge.text}</span>
                </div>
                <div style={{ fontSize: "12px", color: T.textDim }}>
                  ขอโดย {requestedByEmp?.name || "?"} — {badge.text}โดย {handledByEmp?.name || "?"}
                </div>
                {req.changes && req.changes.map((c, j) => (
                  <div key={j} style={{ fontSize: "11px", color: T.textMuted, display: "flex", gap: "4px", alignItems: "center", marginTop: "3px" }}>
                    <span style={{ fontWeight: 600 }}>{c.fieldLabel}:</span>
                    <span style={{ textDecoration: "line-through" }}>{c.oldValue}</span>
                    <span>→</span>
                    <span style={{ fontWeight: 700 }}>{c.newValue}</span>
                  </div>
                ))}
                {req.rejectReason && <div style={{ fontSize: "11px", color: T.red, marginTop: "4px" }}>เหตุผล: "{req.rejectReason}"</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [selectedEmpId, setSelectedEmpId] = useState(() => {
    const saved = localStorage.getItem("cannes_emp_id");
    return saved ? parseInt(saved) : null;
  });
  const [records, setRecords] = useState({});
  const [view, setView] = useState("my"); // "my" | "team"
  const [toast, setToast] = useState(null);
  const [editingEmp, setEditingEmp] = useState(null); // emp object for EditModal
  const [viewingLogEmp, setViewingLogEmp] = useState(null); // emp object for EditLogViewer
  const [editLogFlags, setEditLogFlags] = useState({}); // { empId: true } if has logs
  const [showChangePin, setShowChangePin] = useState(false);
  const [showPendingEdits, setShowPendingEdits] = useState(false);
  const [pendingEditCount, setPendingEditCount] = useState(0);
  const todayKey = getTodayKey();

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  // Firebase listener
  useEffect(() => {
    if (!firebaseReady || !db) return;
    const ref = db.ref(`records/${todayKey}`);
    const handler = ref.on("value", (snap) => {
      const data = snap.val() || {};
      // Convert Firebase structure to flat records
      const flat = {};
      Object.entries(data).forEach(([empId, rec]) => {
        flat[`${todayKey}-${empId}`] = { empId: parseInt(empId), ...rec };
      });
      setRecords(flat);
    });
    return () => ref.off("value", handler);
  }, [todayKey]);

  // Listen for edit logs to show indicator
  useEffect(() => {
    if (!firebaseReady || !db) return;
    const ref = db.ref(`edit_logs/${todayKey}`);
    const handler = ref.on("value", (snap) => {
      const data = snap.val() || {};
      const flags = {};
      Object.keys(data).forEach(empId => { flags[empId] = true; });
      setEditLogFlags(flags);
    });
    return () => ref.off("value", handler);
  }, [todayKey]);

  // Listen for pending edit requests count
  useEffect(() => {
    if (!firebaseReady || !db) return;
    const ref = db.ref(`edit_requests/${todayKey}`);
    const handler = ref.on("value", (snap) => {
      const data = snap.val() || {};
      let count = 0;
      Object.values(data).forEach(empReqs => {
        Object.values(empReqs).forEach(req => {
          if (req.status === "pending") count++;
        });
      });
      setPendingEditCount(count);
    });
    return () => ref.off("value", handler);
  }, [todayKey]);

  const selectEmployee = (id) => {
    localStorage.setItem("cannes_emp_id", id.toString());
    setSelectedEmpId(id);
  };

  const emp = EMPLOYEES.find(e => e.id === selectedEmpId);
  const myRecord = records[`${todayKey}-${selectedEmpId}`];

  const handleAction = (data) => {
    setRecords(prev => ({
      ...prev,
      [`${todayKey}-${selectedEmpId}`]: { ...prev[`${todayKey}-${selectedEmpId}`], ...data }
    }));
  };

  // Stats
  const stats = useMemo(() => {
    let checkedIn = 0, working = 0, done = 0, lateCount = 0, onBreak = 0;
    EMPLOYEES.forEach(e => {
      const rec = records[`${todayKey}-${e.id}`];
      const st = getRecordStatus(rec, e);
      if (rec?.checkIn) {
        checkedIn++;
        const isSplit = rec.shift === 1 && e.shifts;
        if (isLate(rec.checkIn, isSplit ? SHIFT_INFO[1].r1In : e.scheduleIn)) lateCount++;
      }
      if (st === "working" || st === "working_r1" || st === "working_r2") working++;
      if (st === "on_break") onBreak++;
      if (st === "done") done++;
    });
    return { all: EMPLOYEES.length, checkedIn, working, done, lateCount, onBreak };
  }, [records, todayKey]);

  if (!selectedEmpId) return <EmployeeSelector onSelect={selectEmployee} />;

  return (
    <div style={{ background: T.bg, minHeight: "100dvh", paddingBottom: "100px" }}>
      <Toast toast={toast} />

      {/* Edit Modal */}
      {editingEmp && (
        <EditModal
          emp={editingEmp}
          record={records[`${todayKey}-${editingEmp.id}`]}
          dateKey={todayKey}
          onClose={() => setEditingEmp(null)}
          showToast={showToast}
          editedBy={selectedEmpId}
        />
      )}

      {/* Edit Log Viewer */}
      {viewingLogEmp && (
        <EditLogViewer
          emp={viewingLogEmp}
          dateKey={todayKey}
          onClose={() => setViewingLogEmp(null)}
        />
      )}

      {/* Change PIN Modal */}
      {showChangePin && emp && (
        <ChangePinModal emp={emp} onClose={() => setShowChangePin(false)} showToast={showToast} />
      )}

      {/* Pending Edits Panel */}
      {showPendingEdits && (
        <PendingEditsPanel dateKey={todayKey} approverEmpId={selectedEmpId} showToast={showToast} onClose={() => setShowPendingEdits(false)} />
      )}

      {/* Header */}
      <div style={{
        background: T.bg, borderBottom: `1px solid ${T.border}`, position: "sticky", top: 0, zIndex: 100,
        padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <div style={{
            width: 36, height: 36, borderRadius: "10px",
            background: `linear-gradient(135deg, ${T.accent}, #d97706)`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: "18px", fontWeight: 900, color: "#000",
          }}>C</div>
          <div>
            <div style={{ fontSize: "15px", fontWeight: 800, color: T.text }}>Cannes & Co.</div>
            <div style={{ fontSize: "10px", color: T.textDim }}>TIME STAMP</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <div style={{ textAlign: "right", marginRight: "4px" }}>
            <div style={{ fontSize: "13px", fontWeight: 700, color: T.accent }}>{emp?.name}</div>
            <div style={{ fontSize: "10px", color: T.textDim }}>{emp?.position}</div>
          </div>
          <button onClick={() => setShowPendingEdits(true)} title="คำขอแก้ไข" style={{
            width: 32, height: 32, borderRadius: "8px", border: `1px solid ${pendingEditCount > 0 ? T.accent : T.border}`,
            background: pendingEditCount > 0 ? `${T.accent}20` : "transparent",
            color: pendingEditCount > 0 ? T.accent : T.textMuted,
            fontSize: "14px", cursor: "pointer", position: "relative",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            📝
            {pendingEditCount > 0 && (
              <span style={{
                position: "absolute", top: -4, right: -4, width: 18, height: 18,
                borderRadius: "50%", background: T.red, color: "#fff",
                fontSize: "10px", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center",
              }}>{pendingEditCount}</span>
            )}
          </button>
          <button onClick={() => setShowChangePin(true)} title="เปลี่ยน PIN" style={{
            width: 32, height: 32, borderRadius: "8px", border: `1px solid ${T.border}`,
            background: "transparent", color: T.textMuted, fontSize: "14px", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>🔐</button>
          <button onClick={() => { localStorage.removeItem("cannes_emp_id"); setSelectedEmpId(null); }} style={{
            width: 32, height: 32, borderRadius: "8px", border: `1px solid ${T.border}`,
            background: "transparent", color: T.textMuted, fontSize: "14px", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>↩</button>
        </div>
      </div>

      <div style={{ maxWidth: 500, margin: "0 auto", padding: "0 16px" }}>
        <Clock />
        <FirebaseStatus />

        {/* View Toggle */}
        <div style={{ display: "flex", gap: "4px", background: T.card, borderRadius: "12px", padding: "4px", border: `1px solid ${T.border}`, marginBottom: "16px" }}>
          {[{ key: "my", label: "ของฉัน", icon: "👤" }, { key: "team", label: "ทีมทั้งหมด", icon: "👥" }].map(v => (
            <button key={v.key} onClick={() => setView(v.key)} style={{
              flex: 1, padding: "10px", borderRadius: "8px", border: "none", cursor: "pointer",
              background: view === v.key ? T.accent : "transparent",
              color: view === v.key ? "#000" : T.textMuted,
              fontWeight: 700, fontSize: "13px", transition: "all 0.2s",
            }}>{v.icon} {v.label}</button>
          ))}
        </div>

        {/* My Check-in */}
        {view === "my" && emp && (
          <MyCheckInCard emp={emp} record={myRecord} onAction={handleAction} showToast={showToast} />
        )}

        {/* Team View */}
        {view === "team" && (
          <>
            {/* Mini Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "6px", marginBottom: "16px" }}>
              {[
                { label: "เข้างาน", val: stats.checkedIn, color: T.green },
                { label: "ทำงาน", val: stats.working, color: T.accentLight },
                { label: "เสร็จ", val: stats.done, color: T.purple },
                { label: "สาย", val: stats.lateCount, color: T.red },
              ].map(s => (
                <div key={s.label} style={{ background: T.card, borderRadius: "12px", padding: "12px", textAlign: "center", border: `1px solid ${T.border}` }}>
                  <div style={{ fontSize: "22px", fontWeight: 900, color: s.color, fontFamily: "monospace" }}>{s.val}</div>
                  <div style={{ fontSize: "10px", color: T.textDim, fontWeight: 600, marginTop: "2px" }}>{s.label}</div>
                </div>
              ))}
            </div>
            {/* Employee List */}
            <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
              {EMPLOYEES.map(e => (
                <EmpRow key={e.id} emp={e} record={records[`${todayKey}-${e.id}`]}
                  onEdit={(em) => setEditingEmp(em)}
                  onViewLog={(em) => setViewingLogEmp(em)}
                  hasLogs={!!editLogFlags[e.id]}
                />
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
